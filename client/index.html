<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="%BASE_URL%vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Pre-warm the OpenFreeMap origin so the first tile fetch on map open
         doesn't pay the DNS + TLS handshake cost (saves ~100-300ms). -->
        <link
            rel="preconnect"
            href="https://tiles.openfreemap.org"
            crossorigin
        />
        <link rel="dns-prefetch" href="https://tiles.openfreemap.org" />
        <title>MCMS</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
